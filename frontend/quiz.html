<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arena | SEA-1 MCQ Battle</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        lime: {
                            DEFAULT: '#C3D809',
                            dark: '#a8bb07',
                            light: '#d4eb1a',
                        },
                        dark: {
                            base: '#222022',
                            2: '#2d2b2d',
                            3: '#383638',
                            4: '#4a484a',
                        }
                    },
                    fontFamily: {
                        sans: ['"Space Grotesk"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
                        display: ['"Barlow Condensed"', '"Barlow"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#222022] text-slate-100 min-h-screen bg-mesh flex flex-col">

    <!-- Header Navbar -->
    <header id="navbar-container" class="glass-panel sticky top-0 z-50 border-b border-white/5"></header>

    <!-- Main quiz content -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 w-full flex flex-col justify-start gap-4">
        
        <!-- Header HUD -->
        <div class="glass-panel rounded-2xl p-4 border border-white/5 flex flex-row items-center justify-between gap-4">
            <div class="space-y-1">
                <span class="px-2.5 py-0.5 rounded-lg text-[10px] font-bold bg-[#C3D809]/10 text-[#C3D809] border border-[#C3D809]/20" id="quiz-category">General</span>
                <h1 class="text-lg font-extrabold tracking-tight font-display text-white">BATTLE ARENA ACTIVE</h1>
            </div>
            
            <!-- Timer Clock -->
            <div class="flex items-center gap-3 bg-[#C3D809]/5 border border-[#C3D809]/20 px-4 py-1.5 rounded-xl timer-pulse" id="timer-box">
                <i class="far fa-clock text-base text-[#C3D809]" id="timer-icon"></i>
                <div class="text-right">
                    <span class="text-[9px] text-gray-500 block uppercase tracking-wider font-semibold leading-none mb-0.5">Time Left</span>
                    <span id="countdown-clock" class="text-base font-mono font-extrabold text-[#C3D809]">05:00</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            
            <!-- Left Side: HUD Nav Breadcrumbs (1 Col) -->
            <div class="lg:col-span-1 glass-panel rounded-2xl p-4 border border-white/5 flex flex-col gap-4 h-fit">
                <div class="border-b border-white/5 pb-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Question Map</h3>
                </div>
                
                <!-- Number bubbles grid -->
                <div class="grid grid-cols-5 lg:grid-cols-3 gap-2" id="breadcrumb-grid">
                    <!-- Javascript generated buttons -->
                </div>

                <div class="pt-2 border-t border-white/5 space-y-2">
                    <div class="flex justify-between text-[11px] text-gray-400">
                        <span>Quiz Progress</span>
                        <span id="progress-text" class="font-bold">0 / 0 Answered</span>
                    </div>
                    <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar-fill" class="bg-[#C3D809] h-full rounded-full animate-pulse" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Questions Arena (3 Cols) -->
            <div class="lg:col-span-3 flex flex-col justify-between glass-panel rounded-2xl p-6 border border-white/5 min-h-[300px]">
                
                <!-- Main question body -->
                <div class="space-y-4 flex-grow">
                    <!-- Q Number -->
                    <div class="flex items-center justify-between text-xs text-gray-400">
                        <span>QUESTION <span id="q-current-number" class="text-[#C3D809] font-bold">1</span> OF <span id="q-total-number">10</span></span>
                    </div>

                    <!-- Question Prompt -->
                    <h2 class="text-base sm:text-lg font-bold leading-relaxed text-slate-100" id="question-text">
                        Loading question...
                    </h2>

                    <!-- Question Option Choices -->
                    <div class="grid grid-cols-1 gap-2.5 pt-2" id="options-container">
                        <!-- Dynamic Choices -->
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div class="flex items-center justify-between border-t border-white/5 pt-4 mt-6">
                    <button id="btn-prev" class="px-4 py-2 rounded-xl font-bold bg-white/5 border border-white/10 hover:bg-white/10 text-slate-200 transition-all flex items-center gap-2 cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed text-xs">
                        <i class="fas fa-arrow-left text-xs"></i> Previous
                    </button>

                    <button id="btn-next" class="px-5 py-2 rounded-xl font-bold bg-[#C3D809] hover:bg-[#d4eb1a] text-[#111111] shadow-lg shadow-[#C3D809]/20 transition-all flex items-center gap-2 cursor-pointer text-xs">
                        Next <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </div>

            </div>

        </div>

    </main>

    <!-- Overlay lock spinner for submission state -->
    <div id="submit-overlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex flex-col items-center justify-center gap-4 hidden">
        <div class="h-16 w-16 rounded-full border-4 border-t-blue-500 border-r-transparent border-b-transparent border-l-transparent animate-spin"></div>
        <div class="text-center space-y-1">
            <h3 class="text-lg font-bold text-slate-100">GRADING ANSWERS SECURELY</h3>
            <p class="text-xs text-gray-400">Awarding XP points, updating streaks and badges...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="glass-panel border-t border-white/5 py-4 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="text-xs text-gray-500">&copy; 2026 SEA-1 MCQ Battle Platform.</span>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        protectPage();

        // State Manager
        let questions = [];
        let currentIndex = 0;
        let answers = {}; // Maps question ID to chosen option ('A', 'B', etc.)
        let questionTimeLeft = 30; // per-question 30 seconds
        let questionTimerInterval = null;
        let questionEndTime = null; // timestamp when current question expires
        let quizInProgress = false;
        let skippedQuestions = new Set();

        // Warn user if they try to navigate away during an active quiz
        window.addEventListener('beforeunload', (e) => {
            if (quizInProgress) {
                const msg = 'A quiz is in progress. Leaving now will lose your progress.';
                e.preventDefault();
                e.returnValue = msg;
                return msg;
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            // Load questions from local storage cache
            const cached = localStorage.getItem('current_quiz_questions');
            if (!cached) {
                alert("No active quiz session found. Please configure a quiz on your Dashboard.");
                window.location.href = 'dashboard.html';
                return;
            }

            questions = JSON.parse(cached);
            if (questions.length === 0) {
                alert("Question pool is empty. Please select a different category.");
                window.location.href = 'dashboard.html';
                return;
            }

            // Init HUD details
            document.getElementById('q-total-number').innerText = questions.length;
            document.getElementById('quiz-category').innerText = questions[0].category || "General";

            // Mark quiz in progress and start per-question timer
            quizInProgress = true;

            // Render breadcrumbs
            initBreadcrumbs();

            // Load first question
            showQuestion(0);

            // Hook listeners
            document.getElementById('btn-prev').addEventListener('click', prevQuestion);
            document.getElementById('btn-next').addEventListener('click', nextQuestionOrSubmit);
        });

        function startQuestionTimer() {
            // Clear any existing per-question timer
            if (questionTimerInterval) clearInterval(questionTimerInterval);

            // Start fresh 30s countdown for this question
            questionTimeLeft = 30;
            questionEndTime = Date.now() + (questionTimeLeft * 1000);

            const clockEl = document.getElementById('countdown-clock');
            const timerBox = document.getElementById('timer-box');
            const timerIcon = document.getElementById('timer-icon');

            // Update display function uses the end timestamp so it's resilient to background throttling
            function tick() {
                const msLeft = questionEndTime - Date.now();
                const secsLeft = Math.max(0, Math.ceil(msLeft / 1000));

                const mins = Math.floor(secsLeft / 60).toString().padStart(2, '0');
                const secs = (secsLeft % 60).toString().padStart(2, '0');
                clockEl.innerText = `${mins}:${secs}`;

                if (secsLeft <= 10) {
                    timerBox.className = "flex items-center gap-3 bg-red-500/10 border border-red-500/30 px-4 py-1.5 rounded-xl timer-pulse text-red-400";
                    timerIcon.className = "far fa-clock text-base text-red-400 animate-bounce";
                    clockEl.className = "text-base font-mono font-extrabold text-red-400";
                } else {
                    timerBox.className = "flex items-center gap-3 bg-[#C3D809]/5 border border-[#C3D809]/20 px-4 py-1.5 rounded-xl timer-pulse";
                    timerIcon.className = "far fa-clock text-base text-[#C3D809]";
                    clockEl.className = "text-base font-mono font-extrabold text-[#C3D809]";
                }

                if (secsLeft <= 0) {
                    // Clear interval and proceed immediately
                    if (questionTimerInterval) clearInterval(questionTimerInterval);
                    questionTimerInterval = null;
                    
                    // Mark as skipped if no answer is selected
                    const currentQ = questions[currentIndex];
                    if (!answers[currentQ.id]) {
                        skippedQuestions.add(currentQ.id);
                    }

                    // Auto-advance to next question or submit if last
                    if (currentIndex < questions.length - 1) {
                        showQuestion(currentIndex + 1);
                    } else {
                        autoSubmitQuiz();
                    }
                }
            }

            // Run tick immediately and then on a regular interval. Using a short interval keeps UI responsive; the remaining time is derived from Date so it's accurate despite throttling.
            tick();
            questionTimerInterval = setInterval(tick, 500);
        }

        function initBreadcrumbs() {
            const grid = document.getElementById('breadcrumb-grid');
            grid.innerHTML = '';

            questions.forEach((_, idx) => {
                const btn = document.createElement('button');
                btn.id = `crumb-btn-${idx}`;
                btn.type = 'button';
                btn.className = 'py-2 rounded-xl text-xs font-bold border border-white/5 bg-slate-900/40 text-gray-400 transition-all hover:bg-white/5 cursor-pointer';
                btn.innerText = idx + 1;
                btn.addEventListener('click', () => {
                    // Allow navigation only if the current question is answered
                    if (!answers[questions[currentIndex].id]) {
                        alert("Please select an option for the current question before navigating to another question.");
                        return;
                    }
                    saveCurrentDraft();
                    showQuestion(idx);
                });
                grid.appendChild(btn);
            });
            updateBreadcrumbStyles();
        }

        function updateBreadcrumbStyles() {
            questions.forEach((q, idx) => {
                const btn = document.getElementById(`crumb-btn-${idx}`);
                if (!btn) return;

                const hasAnswer = !!answers[q.id];
                const isSkipped = skippedQuestions.has(q.id);

                // Base style reset
                btn.className = 'py-2 rounded-xl text-xs font-bold border transition-all cursor-pointer text-center';

                if (idx === currentIndex) {
                    // Active question
                    btn.classList.add('bg-[#C3D809]/20', 'border-[#C3D809]', 'text-[#C3D809]', 'glow-active');
                } else if (hasAnswer) {
                    // Visited and answered
                    btn.classList.add('bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400');
                } else if (isSkipped) {
                    // Skipped by timer
                    btn.classList.add('bg-red-500/10', 'border-red-500/30', 'text-red-400');
                } else {
                    // Unanswered
                    btn.classList.add('bg-slate-900/40', 'border-white/5', 'text-gray-400', 'hover:bg-white/5');
                }
            });

            // Update Progress Bar
            const total = questions.length;
            const answeredCount = Object.keys(answers).length;
            document.getElementById('progress-text').innerText = `${answeredCount} / ${total} Answered`;
            
            const pct = (answeredCount / total) * 100;
            document.getElementById('progress-bar-fill').style.width = `${pct}%`;
        }

        function showQuestion(index) {
            currentIndex = index;
            const q = questions[currentIndex];

            // Update HUD numbering
            document.getElementById('q-current-number').innerText = currentIndex + 1;

            // Question content
            document.getElementById('question-text').innerText = q.question;

            // Options container
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            const options = [
                { label: 'A', text: q.option_a },
                { label: 'B', text: q.option_b },
                { label: 'C', text: q.option_c },
                { label: 'D', text: q.option_d }
            ];

            options.forEach(opt => {
                const div = document.createElement('div');
                div.id = `opt-card-${opt.label}`;
                div.className = 'quiz-option rounded-xl p-3 flex items-center gap-3 cursor-pointer';
                
                // Active highlighting check
                const isSelected = (answers[q.id] === opt.label);
                if (isSelected) {
                    div.classList.add('selected');
                }

                div.innerHTML = `
                    <div class="h-7 w-7 rounded-lg flex items-center justify-center font-bold text-xs ring-1 ring-white/10 select-letter transition-colors ${isSelected ? 'bg-[#C3D809] text-[#111111] font-bold' : 'bg-slate-900 text-gray-400'}">
                        ${opt.label}
                    </div>
                    <span class="text-xs sm:text-sm font-medium select-text">${opt.text}</span>
                `;

                div.addEventListener('click', () => selectOption(opt.label));
                container.appendChild(div);
            });

            // Navigation Button controls
            const prevBtn = document.getElementById('btn-prev');
            const nextBtn = document.getElementById('btn-next');

            // Previous navigation allowed but disabled on first question or if unanswered
            prevBtn.disabled = (currentIndex === 0) || !answers[q.id];
            prevBtn.style.display = (currentIndex === 0) ? 'none' : '';

            if (currentIndex === questions.length - 1) {
                nextBtn.innerHTML = `<span>Submit Quiz</span> <i class="fas fa-check-circle text-xs"></i>`;
                nextBtn.className = "px-6 py-2.5 rounded-xl font-bold bg-[#C3D809] hover:bg-[#d4eb1a] text-[#111111] shadow-lg shadow-[#C3D809]/20 transition-all flex items-center gap-2 cursor-pointer text-xs disabled:opacity-30 disabled:cursor-not-allowed";
            } else {
                nextBtn.innerHTML = `Next <i class="fas fa-arrow-right text-xs"></i>`;
                nextBtn.className = "px-5 py-2.5 rounded-xl font-bold bg-[#C3D809] hover:bg-[#d4eb1a] text-[#111111] shadow-lg shadow-[#C3D809]/20 transition-all flex items-center gap-2 cursor-pointer text-xs disabled:opacity-30 disabled:cursor-not-allowed";
            }
            nextBtn.disabled = !answers[q.id];

            updateBreadcrumbStyles();

            // Use or initialize per-question end time so timer keeps running across navigation
            if (!questions[currentIndex].endTime) {
                // first time visiting this question: set end time 30s from now
                questions[currentIndex].endTime = Date.now() + (30 * 1000);
            }
            questionEndTime = questions[currentIndex].endTime;
            startQuestionTimer();
        }

        // Ensure visibility changes update timer immediately and trigger expiration if needed
        document.addEventListener('visibilitychange', () => {
            if (!questionEndTime) return;
            // If document became visible, run a tick to refresh UI and handle potential expiry
            if (!document.hidden) {
                if (questionTimerInterval) {
                    // run one immediate tick by calling the function indirectly
                    // clear and restart interval to ensure immediate update
                    clearInterval(questionTimerInterval);
                    questionTimerInterval = setInterval(() => {
                        const msLeft = questionEndTime - Date.now();
                        const secsLeft = Math.max(0, Math.ceil(msLeft / 1000));
                        const clockEl = document.getElementById('countdown-clock');
                        const mins = Math.floor(secsLeft / 60).toString().padStart(2, '0');
                        const secs = (secsLeft % 60).toString().padStart(2, '0');
                        clockEl.innerText = `${mins}:${secs}`;
                        if (secsLeft <= 0) {
                            clearInterval(questionTimerInterval);
                            questionTimerInterval = null;
                            
                            // Mark as skipped if no answer is selected
                            const currentQ = questions[currentIndex];
                            if (!answers[currentQ.id]) {
                                skippedQuestions.add(currentQ.id);
                            }

                            if (currentIndex < questions.length - 1) {
                                showQuestion(currentIndex + 1);
                            } else {
                                autoSubmitQuiz();
                            }
                        }
                    }, 500);
                } else {
                    // If no interval exists (perhaps just expired), react based on end time
                    if (Date.now() >= questionEndTime) {
                        // Mark as skipped if no answer is selected
                        const currentQ = questions[currentIndex];
                        if (!answers[currentQ.id]) {
                            skippedQuestions.add(currentQ.id);
                        }

                        if (currentIndex < questions.length - 1) {
                            showQuestion(currentIndex + 1);
                        } else {
                            autoSubmitQuiz();
                        }
                    }
                }
            }
        });

        function getDifficultyBorder(diff) {
            const d = (diff || '').toLowerCase();
            if (d === 'easy') return 'border-emerald-500/20 text-emerald-400 bg-emerald-500/5';
            if (d === 'hard') return 'border-red-500/20 text-red-400 bg-red-500/5';
            return 'border-blue-500/20 text-blue-400 bg-blue-500/5';
        }

        function selectOption(label) {
            const q = questions[currentIndex];
            
            // Toggle or set selection
            answers[q.id] = label;

            // Redraw options UI
            ['A', 'B', 'C', 'D'].forEach(letter => {
                const el = document.getElementById(`opt-card-${letter}`);
                const circle = el.querySelector('.select-letter');
                if (letter === label) {
                    el.classList.add('selected');
                    circle.className = 'h-7 w-7 rounded-lg flex items-center justify-center font-bold text-xs ring-1 ring-white/10 select-letter bg-[#C3D809] text-[#111111]';
                } else {
                    el.classList.remove('selected');
                    circle.className = 'h-7 w-7 rounded-lg flex items-center justify-center font-bold text-xs ring-1 ring-white/10 select-letter bg-slate-900 text-gray-400';
                }
            });

            // Enable navigation buttons
            document.getElementById('btn-prev').disabled = (currentIndex === 0);
            document.getElementById('btn-next').disabled = false;

            updateBreadcrumbStyles();
        }

        function saveCurrentDraft() {
            // Choice already saved in global 'answers' object, which is persistent across session
        }

        function prevQuestion() {
            if (!answers[questions[currentIndex].id]) {
                return; // Block
            }
            if (currentIndex > 0) {
                saveCurrentDraft();
                showQuestion(currentIndex - 1);
            }
        }

        function nextQuestionOrSubmit() {
            if (!answers[questions[currentIndex].id]) {
                return; // Block
            }
            saveCurrentDraft();
            if (currentIndex < questions.length - 1) {
                showQuestion(currentIndex + 1);
            } else {
                confirmAndSubmitQuiz();
            }
        }

        function confirmAndSubmitQuiz() {
            const total = questions.length;
            const answeredCount = Object.keys(answers).length;

            if (answeredCount < total) {
                const proceed = confirm(`You have only answered ${answeredCount} out of ${total} questions. Are you sure you want to submit?`);
                if (!proceed) return;
            } else {
                const proceed = confirm("Verify all responses. Ready to submit this attempt?");
                if (!proceed) return;
            }

            executeSubmit();
        }

        function autoSubmitQuiz() {
            alert("⏰ Time is up for this question or quiz! Grading/submitting automatically.");
            executeSubmit();
        }

        async function executeSubmit() {
            if (questionTimerInterval) clearInterval(questionTimerInterval);
            quizInProgress = false;
            
            // Show lock overlay
            document.getElementById('submit-overlay').classList.remove('hidden');

            const payload = {
                answers: answers
            };

            const res = await fetchAPI('/quiz/submit', {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            // Hide overlay
            document.getElementById('submit-overlay').classList.add('hidden');

            if (res.error) {
                alert(`Submit failed: ${res.msg}`);
                window.location.href = 'dashboard.html';
            } else {
                // Clear active question pool
                localStorage.removeItem('current_quiz_questions');

                // Cache results for results page
                localStorage.setItem('last_quiz_results', JSON.stringify(res));

                // Take to results dashboard
                window.location.href = 'results.html';
            }
        }
    </script>
</body>
</html>
