<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SEA-1 MCQ Battle</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            blue: 'var(--primary-blue)',
                            purple: 'var(--primary-purple)',
                            dark: 'var(--primary-dark)',
                        },
                        accent: {
                            cyan: 'var(--accent-cyan)',
                            green: 'var(--accent-green)',
                            orange: 'var(--accent-orange)',
                            red: 'var(--accent-red)',
                        },
                        gray: {
                            50: 'var(--gray-50)',
                            100: 'var(--gray-100)',
                            200: 'var(--gray-200)',
                            300: 'var(--gray-300)',
                            400: 'var(--gray-400)',
                            500: 'var(--gray-500)',
                            600: 'var(--gray-600)',
                            700: 'var(--gray-700)',
                            800: 'var(--gray-800)',
                            900: 'var(--gray-900)',
                        },
                        darkblue: {
                            900: 'var(--bg-secondary)',
                            800: 'var(--bg-primary)',
                            700: 'var(--border-color)',
                        }
                    },
                    fontFamily: {
                        sans: ['"Space Grotesk"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
                        display: ['"Barlow Condensed"', '"Barlow"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#222022] text-slate-100 min-h-screen bg-mesh flex flex-col">

    <!-- Navbar Container -->
    <header id="navbar-container" class="glass-panel sticky top-0 z-50 border-b border-white/5"></header>

    <!-- Content Box -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        
        <div class="w-full max-w-md glass-card rounded-2xl p-8 space-y-6 animate-fade-in">
            
            <div class="text-center space-y-2">
                <div class="inline-flex h-12 w-12 rounded-2xl bg-[#C3D809]/10 text-[#C3D809] border border-[#C3D809]/25 items-center justify-center mb-2">
                    <i class="fas fa-lock text-xl"></i>
                </div>
                <h2 class="text-2xl font-extrabold font-display">SSO Login</h2>
                <p class="text-xs text-slate-400">Use your padikkunnundo.app account to continue.</p>
            </div>

            <!-- Error Notification Panel -->
            <div id="error-box" class="hidden p-3.5 rounded-xl bg-red-500/10 border border-red-500/20 text-xs text-red-400 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="error-message"></span>
            </div>

            <div class="space-y-4">
                <div class="rounded-xl border border-[#C3D809]/20 bg-[#C3D809]/10 p-4 text-sm text-slate-300">
                    <p class="font-semibold text-[#C3D809] mb-2">This site uses single sign-on only.</p>
                    <p>Sign in through your padikkunnundo.app account to access the MCQ portal.</p>
                </div>

                <a href="https://padikkunnundo.app" id="btn-submit" class="w-full py-3 rounded-xl font-bold bg-[#C3D809] hover:bg-[#d4eb1a] text-[#111111] shadow-lg shadow-[#C3D809]/20 font-bold transform hover:-translate-y-0.5 transition-all text-center flex items-center justify-center gap-2 cursor-pointer">
                    <span>Go to padikkunnundo.app</span>
                    <i class="fas fa-arrow-right text-sm"></i>
                </a>
            </div>

        </div>

    </main>

    <footer class="glass-panel border-t border-white/5 py-4 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="text-xs text-gray-500">&copy; 2026 SEA-1 MCQ Battle Platform.</span>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        redirectIfLoggedIn();
    </script>
</body>
</html>
