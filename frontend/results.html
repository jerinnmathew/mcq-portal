<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results | SEA-1 MCQ Battle</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            blue: 'var(--primary-blue)',
                            purple: 'var(--primary-purple)',
                            dark: 'var(--primary-dark)',
                        },
                        accent: {
                            cyan: 'var(--accent-cyan)',
                            green: 'var(--accent-green)',
                            orange: 'var(--accent-orange)',
                            red: 'var(--accent-red)',
                        },
                        gray: {
                            50: 'var(--gray-50)',
                            100: 'var(--gray-100)',
                            200: 'var(--gray-200)',
                            300: 'var(--gray-300)',
                            400: 'var(--gray-400)',
                            500: 'var(--gray-500)',
                            600: 'var(--gray-600)',
                            700: 'var(--gray-700)',
                            800: 'var(--gray-800)',
                            900: 'var(--gray-900)',
                        },
                        darkblue: {
                            900: 'var(--bg-secondary)',
                            800: 'var(--bg-primary)',
                            700: 'var(--border-color)',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
                        display: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darkblue-900 text-slate-100 min-h-screen bg-mesh flex flex-col">

    <!-- Header Navbar -->
    <header id="navbar-container" class="glass-panel sticky top-0 z-50 border-b border-white/5"></header>

    <!-- Main Results Container -->
    <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8 animate-fade-in">
        
        <!-- Score HUD Banner -->
        <div class="glass-panel rounded-3xl p-6 sm:p-8 border border-white/5 flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden">
            <!-- Background ambient glow -->
            <div class="absolute -top-10 -right-10 h-40 w-40 bg-emerald-500/10 rounded-full blur-3xl" id="ambient-glow"></div>
            
            <div class="space-y-4 text-center md:text-left relative z-10">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/10 border border-emerald-500/20 text-emerald-400" id="results-alert">
                    <i class="fas fa-check-circle"></i> Quiz Completed Successfully
                </div>
                
                <h1 class="text-3xl font-extrabold tracking-tight font-display">
                    Battle Arena <span class="text-blue-400">Scorecard</span>
                </h1>
                
                <!-- Rewards Row -->
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-4">
                    <!-- XP reward bubble -->
                    <div class="bg-blue-500/10 border border-blue-500/20 text-blue-400 px-3.5 py-1.5 rounded-xl text-xs font-bold flex items-center gap-2">
                        <i class="fas fa-star"></i> <span id="reward-xp">+0 XP</span>
                    </div>

                    <!-- Streak status bubble -->
                    <div class="bg-orange-500/10 border border-orange-500/20 text-orange-400 px-3.5 py-1.5 rounded-xl text-xs font-bold flex items-center gap-2">
                        <i class="fas fa-calendar-alt"></i> <span id="reward-streak">Streak: 0 Days</span>
                    </div>

                    <!-- Badge status bubble -->
                    <div class="bg-purple-500/10 border border-purple-500/20 text-purple-400 px-3.5 py-1.5 rounded-xl text-xs font-bold flex items-center gap-2" id="badge-wrapper">
                        👑 <span id="reward-badge">Bronze</span>
                    </div>
                </div>
            </div>

            <!-- Score Circle visual display -->
            <div class="flex flex-col items-center gap-2 relative z-10">
                <div class="h-32 w-32 rounded-full border-4 border-emerald-500 flex flex-col items-center justify-center bg-slate-900/40 relative shadow-lg shadow-emerald-500/10" id="score-circle-border">
                    <span id="score-fraction" class="text-3xl font-extrabold text-slate-100 font-display">0 / 10</span>
                    <span id="score-pct-lbl" class="text-xs text-emerald-400 font-semibold">0% Acc</span>
                </div>
            </div>
        </div>

        <!-- Action Items Drawer -->
        <div class="flex flex-wrap items-center justify-center gap-4">
            <a href="dashboard.html" class="px-6 py-3 rounded-xl font-bold bg-white/5 border border-white/10 hover:bg-white/10 text-slate-200 transition-all flex items-center gap-2">
                <i class="fas fa-home"></i> Back to Dashboard
            </a>
            <a href="dashboard.html?action=play" class="px-6 py-3 rounded-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 transition-all flex items-center gap-2">
                <i class="fas fa-rotate-left"></i> Play Another Arena
            </a>
        </div>

        <!-- Correction Breakdown Panel -->
        <div class="space-y-6">
            <div class="border-b border-white/5 pb-2">
                <h3 class="text-lg font-extrabold font-display"><i class="fas fa-spell-check text-blue-500 mr-2"></i> Review Question breakdown</h3>
                <p class="text-xs text-slate-400">Inspect correct options and verify errors.</p>
            </div>

            <div class="space-y-5" id="breakdown-container">
                <!-- Javascript generated questions details -->
                <div class="text-center py-6 text-gray-400 text-sm">
                    No results session cached.
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="glass-panel border-t border-white/5 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="text-xs text-gray-500">&copy; 2026 SEA-1 MCQ Battle Platform.</span>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        protectPage();

        document.addEventListener('DOMContentLoaded', () => {
            const results = JSON.parse(localStorage.getItem('last_quiz_results'));
            if (!results) {
                alert("No recent quiz result found on this device.");
                window.location.href = 'dashboard.html';
                return;
            }

            // Sync user data to refresh profile stats in navbar
            fetchAPI('/auth/profile').then(data => {
                if (data && !data.error) {
                    Auth.saveUser(data.user);
                    renderNavbar();
                }
            });

            renderHUD(results);
            renderBreakdown(results.breakdown || []);
        });

        function renderHUD(res) {
            // Numbers
            document.getElementById('reward-xp').innerText = `+${res.xp_earned} XP`;
            document.getElementById('reward-streak').innerText = `Streak: ${res.new_streak} Days`;
            document.getElementById('reward-badge').innerText = res.badge;
            
            document.getElementById('score-fraction').innerText = `${res.score} / ${res.total_questions}`;
            document.getElementById('score-pct-lbl').innerText = `${res.accuracy.toFixed(0)}% Accuracy`;

            // Adjust HUD styling based on accuracy
            const alertBox = document.getElementById('results-alert');
            const glow = document.getElementById('ambient-glow');
            const scoreCircle = document.getElementById('score-circle-border');

            if (res.accuracy >= 80) {
                alertBox.className = "inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/10 border border-emerald-500/20 text-emerald-400";
                glow.className = "absolute -top-10 -right-10 h-40 w-40 bg-emerald-500/15 rounded-full blur-3xl";
                scoreCircle.className = "h-32 w-32 rounded-full border-4 border-emerald-500 flex flex-col items-center justify-center bg-slate-900/40 relative shadow-lg shadow-emerald-500/20";
                document.getElementById('score-pct-lbl').className = "text-xs text-emerald-400 font-semibold";
            } else if (res.accuracy >= 50) {
                alertBox.className = "inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold bg-blue-500/10 border border-blue-500/20 text-blue-400";
                alertBox.innerHTML = `<i class="fas fa-info-circle"></i> Quiz Completed Successfully`;
                glow.className = "absolute -top-10 -right-10 h-40 w-40 bg-blue-500/15 rounded-full blur-3xl";
                scoreCircle.className = "h-32 w-32 rounded-full border-4 border-blue-500 flex flex-col items-center justify-center bg-slate-900/40 relative shadow-lg shadow-blue-500/20";
                document.getElementById('score-pct-lbl').className = "text-xs text-blue-400 font-semibold";
            } else {
                alertBox.className = "inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold bg-red-500/10 border border-red-500/20 text-red-400";
                alertBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Keep Practicing to Level Up`;
                glow.className = "absolute -top-10 -right-10 h-40 w-40 bg-red-500/15 rounded-full blur-3xl";
                scoreCircle.className = "h-32 w-32 rounded-full border-4 border-red-500 flex flex-col items-center justify-center bg-slate-900/40 relative shadow-lg shadow-red-500/20";
                document.getElementById('score-pct-lbl').className = "text-xs text-red-400 font-semibold";
            }
        }

        function renderBreakdown(list) {
            const container = document.getElementById('breakdown-container');
            container.innerHTML = '';

            list.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = `glass-panel rounded-2xl p-5 sm:p-6 border ${q.is_correct ? 'border-emerald-500/20 bg-emerald-950/5' : 'border-red-500/20 bg-red-950/5'} space-y-4 animate-fade-in`;
                
                // Question text with success indicator icon
                const statusIcon = q.is_correct 
                    ? `<i class="fas fa-check-circle text-emerald-500 text-lg"></i>`
                    : `<i class="fas fa-times-circle text-red-500 text-lg"></i>`;

                const pointsText = q.is_correct 
                    ? `<span class="text-emerald-400 font-bold text-xs bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded">+10 XP</span>`
                    : `<span class="text-red-400 font-bold text-xs bg-red-500/10 border border-red-500/20 px-2 py-0.5 rounded">0 XP</span>`;

                card.innerHTML = `
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex gap-3">
                            <div class="pt-0.5">${statusIcon}</div>
                            <div class="space-y-1">
                                <span class="text-xs text-slate-400 font-bold">QUESTION ${idx + 1}</span>
                                <h4 class="text-sm sm:text-base font-bold text-slate-100 leading-relaxed">${q.question}</h4>
                            </div>
                        </div>
                        <div>${pointsText}</div>
                    </div>

                    <!-- Choices options lists -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-2">
                        ${renderOptionRow('A', q.option_a, q.user_answer, q.correct_answer)}
                        ${renderOptionRow('B', q.option_b, q.user_answer, q.correct_answer)}
                        ${renderOptionRow('C', q.option_c, q.user_answer, q.correct_answer)}
                        ${renderOptionRow('D', q.option_d, q.user_answer, q.correct_answer)}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderOptionRow(letter, text, userAns, correctAns) {
            const isUserChoice = (userAns === letter);
            const isCorrect = (correctAns === letter);

            let rowStyle = 'bg-slate-900/30 border-white/5 text-gray-300';
            let icon = '';

            if (isCorrect) {
                // Correct choice gets emerald treatment always
                rowStyle = 'bg-emerald-500/10 border-emerald-500/30 text-emerald-300 font-semibold';
                icon = '<i class="fas fa-check text-xs ml-auto text-emerald-400"></i>';
            } else if (isUserChoice) {
                // User choice that is wrong (since the correct branch already triggered)
                rowStyle = 'bg-red-500/10 border-red-500/30 text-red-300 font-semibold';
                icon = '<i class="fas fa-times text-xs ml-auto text-red-400"></i>';
            }

            return `
                <div class="flex items-center gap-3 p-3 rounded-xl border text-xs sm:text-sm ${rowStyle}">
                    <div class="h-6 w-6 rounded-lg bg-slate-900 flex items-center justify-center font-bold text-[10px] ring-1 ring-white/10 text-slate-400">
                        ${letter}
                    </div>
                    <span>${text}</span>
                    ${icon}
                </div>
            `;
        }
    </script>
</body>
</html>
