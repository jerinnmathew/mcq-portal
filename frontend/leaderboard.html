<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | SEA-1 MCQ Battle</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        lime: {
                            DEFAULT: '#C3D809',
                            dark: '#a8bb07',
                            light: '#d4eb1a',
                        },
                        dark: {
                            base: '#222022',
                            2: '#2d2b2d',
                            3: '#383638',
                            4: '#4a484a',
                        }
                    },
                    fontFamily: {
                        sans: ['"Space Grotesk"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
                        display: ['"Barlow Condensed"', '"Barlow"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#222022] text-slate-100 min-h-screen bg-mesh flex flex-col">

    <!-- Header Navbar -->
    <header id="navbar-container" class="glass-panel sticky top-0 z-50 border-b border-white/5"></header>

    <!-- Main Scoreboard Container -->
    <main class="flex-grow max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8 animate-fade-in">
        
        <!-- Welcome Title & Filter Tabs -->
        <div class="flex flex-col md:flex-row items-center justify-between gap-6 border-b border-white/5 pb-6">
            <div class="space-y-1 text-center md:text-left">
                <h1 class="text-3xl font-extrabold tracking-tight font-display">
                    <span class="text-[#C3D809]">Leaderboard</span>
                </h1>
                <p class="text-xs text-slate-400">Compete with peer students. Ranks update after every quiz grading.</p>
            </div>

            <!-- Tab Filter Buttons -->
            <div class="flex p-1 bg-[#2d2b2d] rounded-xl border border-[#C3D809]/15 shadow-sm" id="leaderboard-tabs">
                <button onclick="loadLeaderboard('today', this)" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-[#C3D809] transition-all cursor-pointer">
                    TODAY
                </button>
                <button onclick="loadLeaderboard('weekly', this)" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-[#C3D809] transition-all cursor-pointer">
                    WEEKLY
                </button>
                <button onclick="loadLeaderboard('all-time', this)" class="px-4 py-2 rounded-lg text-xs font-bold text-[#111111] bg-[#C3D809] shadow-sm active-tab transition-all cursor-pointer">
                    ALL-TIME
                </button>
            </div>
        </div>

        <!-- 3-Tier Podium showcase (Top 3) -->
        <div class="grid grid-cols-3 gap-2 sm:gap-6 items-end max-w-3xl mx-auto pt-6" id="podium-container">
            
            <!-- 2nd Place Podium Column (Left) -->
            <div class="order-1 flex flex-col items-center">
                <!-- Avatar box -->
                <div class="relative mb-3 flex flex-col items-center">
                    <div class="h-16 w-16 rounded-2xl bg-gradient-to-tr from-slate-300 to-slate-400 flex items-center justify-center font-bold text-slate-900 text-xl shadow-lg ring-2 ring-slate-400/30" id="pod-2-avatar">
                        -
                    </div>
                    <span class="absolute -bottom-2 px-2.5 py-0.5 rounded-full text-[9px] font-bold bg-slate-400 text-slate-950 uppercase">2nd Place</span>
                </div>
                
                <!-- Podium block -->
                <div class="w-full podium-2 rounded-t-2xl p-5 text-center space-y-2 h-44 flex flex-col justify-center shadow-lg border border-white/10">
                    <h3 class="font-extrabold text-sm text-slate-200 line-clamp-1" id="pod-2-name">Awaiting Battle</h3>
                    <span class="text-xs text-gray-400 block" id="pod-2-xp">0 XP</span>
                    <span class="text-xs text-slate-300 block" id="pod-2-streak"><i class="fas fa-calendar-alt text-orange-400 mr-1"></i>0 Streak</span>
                </div>
            </div>

            <!-- 1st Place Podium Column (Center) -->
            <div class="order-2 flex flex-col items-center">
                <!-- Golden Crown icon -->
                <i class="fas fa-crown text-yellow-400 text-2xl mb-2 animate-bounce"></i>
                <!-- Avatar box -->
                <div class="relative mb-3 flex flex-col items-center">
                    <div class="h-20 w-20 rounded-2xl bg-gradient-to-tr from-yellow-400 to-amber-500 flex items-center justify-center font-bold text-slate-900 text-2xl shadow-xl ring-4 ring-yellow-400/20" id="pod-1-avatar">
                        -
                    </div>
                    <span class="absolute -bottom-2 px-3 py-0.5 rounded-full text-[10px] font-extrabold bg-yellow-400 text-slate-950 uppercase tracking-wider">CHAMPION</span>
                </div>

                <!-- Podium block -->
                <div class="w-full podium-1 rounded-t-2xl p-6 text-center space-y-2 h-56 flex flex-col justify-center shadow-2xl glow-active">
                    <h3 class="font-extrabold text-base text-slate-100 line-clamp-1" id="pod-1-name">Awaiting Battle</h3>
                    <span class="text-sm font-extrabold text-yellow-400 block" id="pod-1-xp">0 XP</span>
                    <span class="text-xs text-slate-300 block" id="pod-1-streak"><i class="fas fa-calendar-alt text-orange-400 mr-1"></i>0 Streak</span>
                </div>
            </div>

            <!-- 3rd Place Podium Column (Right) -->
            <div class="order-3 flex flex-col items-center">
                <!-- Avatar box -->
                <div class="relative mb-3 flex flex-col items-center">
                    <div class="h-16 w-16 rounded-2xl bg-gradient-to-tr from-amber-600 to-amber-800 flex items-center justify-center font-bold text-slate-200 text-xl shadow-lg ring-2 ring-amber-700/30" id="pod-3-avatar">
                        -
                    </div>
                    <span class="absolute -bottom-2 px-2.5 py-0.5 rounded-full text-[9px] font-bold bg-amber-700 text-slate-200 uppercase">3rd Place</span>
                </div>

                <!-- Podium block -->
                <div class="w-full podium-3 rounded-t-2xl p-5 text-center space-y-2 h-36 flex flex-col justify-center shadow-lg border border-white/10">
                    <h3 class="font-extrabold text-sm text-slate-300 line-clamp-1" id="pod-3-name">Awaiting Battle</h3>
                    <span class="text-xs text-gray-400 block" id="pod-3-xp">0 XP</span>
                    <span class="text-xs text-slate-300 block" id="pod-3-streak"><i class="fas fa-calendar-alt text-orange-400 mr-1"></i>0 Streak</span>
                </div>
            </div>

        </div>

        

    </main>

    <!-- Footer -->
    <footer class="glass-panel border-t border-white/5 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="text-xs text-gray-500">&copy; 2026 SEA-1 MCQ Battle Platform.</span>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load all-time by default on load
            const activeTab = document.querySelector('#leaderboard-tabs button:nth-child(3)');
            loadLeaderboard('all-time', activeTab);
        });

        async function loadLeaderboard(filterScope, btnElement) {
            // Adjust active class styles on tabs
            const tabs = document.querySelectorAll('#leaderboard-tabs button');
            tabs.forEach(t => {
                t.className = "px-4 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-[#C3D809] transition-all cursor-pointer";
            });
            btnElement.className = "px-4 py-2 rounded-lg text-xs font-bold text-[#111111] bg-[#C3D809] shadow-sm active-tab transition-all cursor-pointer";

            // Fetch
            const res = await fetchAPI(`/stats/leaderboard?filter=${filterScope}`);
            if (res.error) {
                console.error("Failed to load scoreboard:", res.msg);
                return;
            }

            renderStandings(res);
        }

        function renderStandings(users) {
            // Reset Podiums default values
            resetPodiumUI();

            // Populate Podiums (indices 0, 1, 2 in order)
            if (users.length >= 1) {
                fillPodiumSpot(1, users[0]);
            }
            if (users.length >= 2) {
                fillPodiumSpot(2, users[1]);
            }
            if (users.length >= 3) {
                fillPodiumSpot(3, users[2]);
            }
        }

        function resetPodiumUI() {
            // Champion Reset
            document.getElementById('pod-1-avatar').innerText = '-';
            document.getElementById('pod-1-avatar').className = "h-20 w-20 rounded-2xl bg-slate-800 flex items-center justify-center font-bold text-slate-500 text-2xl shadow-xl ring-2 ring-white/5";
            document.getElementById('pod-1-name').innerText = 'Awaiting Battle';
            document.getElementById('pod-1-xp').innerText = '0 XP';
            document.getElementById('pod-1-streak').innerHTML = '<i class="fas fa-calendar-alt text-orange-400 mr-1"></i>0 Streak';

            // 2nd Place Reset
            document.getElementById('pod-2-avatar').innerText = '-';
            document.getElementById('pod-2-avatar').className = "h-16 w-16 rounded-2xl bg-slate-800 flex items-center justify-center font-bold text-slate-500 text-xl shadow-lg ring-2 ring-white/5";
            document.getElementById('pod-2-name').innerText = 'Awaiting Battle';
            document.getElementById('pod-2-xp').innerText = '0 XP';
            document.getElementById('pod-2-streak').innerHTML = '<i class="fas fa-calendar-alt text-orange-400 mr-1"></i>0 Streak';

            // 3rd Place Reset
            document.getElementById('pod-3-avatar').innerText = '-';
            document.getElementById('pod-3-avatar').className = "h-16 w-16 rounded-2xl bg-slate-800 flex items-center justify-center font-bold text-slate-500 text-xl shadow-lg ring-2 ring-white/5";
            document.getElementById('pod-3-name').innerText = 'Awaiting Battle';
            document.getElementById('pod-3-xp').innerText = '0 XP';
            document.getElementById('pod-3-streak').innerHTML = '<i class="fas fa-calendar-alt text-orange-400 mr-1"></i>0 Streak';
        }

        function fillPodiumSpot(spot, user) {
            const letter = user.username[0].toUpperCase();
            
            if (spot === 1) {
                const avatar = document.getElementById('pod-1-avatar');
                avatar.innerText = letter;
                avatar.className = "h-20 w-20 rounded-2xl bg-gradient-to-tr from-yellow-400 to-amber-500 flex items-center justify-center font-bold text-slate-900 text-2xl shadow-xl ring-4 ring-yellow-400/20";
                
                document.getElementById('pod-1-name').innerText = user.username;
                document.getElementById('pod-1-xp').innerText = `${user.xp_points} XP`;
                document.getElementById('pod-1-streak').innerHTML = `<i class="fas fa-calendar-alt text-orange-400 mr-1"></i>${user.streak || 0} Streak`;
            } else if (spot === 2) {
                const avatar = document.getElementById('pod-2-avatar');
                avatar.innerText = letter;
                avatar.className = "h-16 w-16 rounded-2xl bg-gradient-to-tr from-slate-300 to-slate-400 flex items-center justify-center font-bold text-slate-900 text-xl shadow-lg ring-2 ring-slate-400/30";

                document.getElementById('pod-2-name').innerText = user.username;
                document.getElementById('pod-2-xp').innerText = `${user.xp_points} XP`;
                document.getElementById('pod-2-streak').innerHTML = `<i class="fas fa-calendar-alt text-orange-400 mr-1"></i>${user.streak || 0} Streak`;
            } else if (spot === 3) {
                const avatar = document.getElementById('pod-3-avatar');
                avatar.innerText = letter;
                avatar.className = "h-16 w-16 rounded-2xl bg-gradient-to-tr from-amber-600 to-amber-800 flex items-center justify-center font-bold text-slate-200 text-xl shadow-lg ring-2 ring-amber-700/30";

                document.getElementById('pod-3-name').innerText = user.username;
                document.getElementById('pod-3-xp').innerText = `${user.xp_points} XP`;
                document.getElementById('pod-3-streak').innerHTML = `<i class="fas fa-calendar-alt text-orange-400 mr-1"></i>${user.streak || 0} Streak`;
            }
        }

        function getBadgeStyleClass(badge) {
            const b = (badge || '').toLowerCase();
            if (b === 'platinum') return 'bg-slate-300/10 text-slate-200 border border-slate-300/20';
            if (b === 'gold') return 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20';
            if (b === 'silver') return 'bg-slate-400/10 text-slate-400 border border-slate-400/20';
            return 'bg-amber-700/10 text-amber-500 border border-amber-700/20';
        }
    </script>
</body>
</html>
